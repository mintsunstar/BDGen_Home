<!DOCTYPE html>
<!-- 레퍼런스 카드 호버용 — iframe 실제 크기(client*)로 contain 스케일 (100vh는 중첩 iframe에서 창 전체로 잡히는 경우가 있음) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBDC architecture · thumb</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f0f4fa;
  }
  .holder {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }
  .scaler {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1080px;
    height: 880px;
    margin-left: -540px;
    margin-top: -440px;
    transform-origin: center center;
    will-change: transform;
  }
  .scaler iframe {
    width: 1080px;
    height: 880px;
    border: 0;
    display: block;
    background: #f0f4fa;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="holder">
  <div class="scaler" id="cbdc-thumb-scaler">
    <iframe src="ref-cbdc-architecture-v2.html?v=1" title="CBDC · Digital Wallet Service Architecture" loading="eager" scrolling="no"></iframe>
  </div>
</div>
<script>
(function () {
  var scaler = document.getElementById('cbdc-thumb-scaler');
  if (!scaler) return;

  var W = 1080;
  var H = 880;
  /** contain 스케일 대비 확대 비율 (기준 대비 누적 +21% ≈ +10% 추가) */
  var SCALE_BOOST = 1.21;
  var raf = 0;

  function fit() {
    var el = document.documentElement;
    var cw = el.clientWidth;
    var ch = el.clientHeight;
    if (cw < 1 || ch < 1) return;
    var s = Math.min(cw / W, ch / H) * SCALE_BOOST;
    if (!isFinite(s) || s <= 0) s = 0.15;
    scaler.style.transform = 'scale(' + s + ')';
  }

  function scheduleFit() {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(function () {
      raf = 0;
      fit();
    });
  }

  fit();
  window.addEventListener('resize', scheduleFit);
  if (typeof ResizeObserver !== 'undefined') {
    try {
      var ro = new ResizeObserver(scheduleFit);
      ro.observe(document.documentElement);
    } catch (e) {}
  }
})();
</script>
</body>
</html>
