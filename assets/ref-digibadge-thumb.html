<!DOCTYPE html>
<!-- 레퍼런스 썸네일 전용 — 쿼리스트링 없이 항상 축소·무스크롤 (iframe src로만 로드) -->
<html lang="ko" class="ref-digibadge-embed-thumb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
  body {
    margin: 0;
    background: #f8fafc;
    font-family: Pretendard, system-ui, sans-serif;
  }

  .flow {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 30px;
    align-items: center;
  }

  .card {
    width: 180px;
    height: 140px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .icon {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .label {
    font-weight: 600;
    font-size: 14px;
  }

  .system {
    width: 240px;
    height: 140px;
    background: #2563eb;
    color: white;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(37,99,235,0.3);
  }

  .blockchain {
    width: 260px;
    height: 180px;
    border: 2px dashed #c7d2fe;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background: #eef2ff;
  }

  .mini-wrap {
    display: flex;
    gap: 15px;
  }

  .mini {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.05);
  }

  .arrow {
    width: 80px;
    height: 2px;
    background: #cbd5e1;
    position: relative;
  }

  .arrow::after {
    content: '';
    position: absolute;
    right: -6px;
    top: -4px;
    border-left: 6px solid #cbd5e1;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  .subtext {
    font-size: 12px;
    color: #64748b;
    text-align: center;
  }

  html.ref-digibadge-embed-thumb {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden !important;
    overscroll-behavior: none;
    background: #f8fafc;
  }
  html.ref-digibadge-embed-thumb body {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden !important;
    overscroll-behavior: none;
    background: #f8fafc;
  }
  html.ref-digibadge-embed-thumb .wrap {
    width: 100% !important;
    max-width: 100% !important;
    height: 100% !important;
    max-height: 100% !important;
    margin: 0 !important;
    box-sizing: border-box;
    overflow: hidden !important;
    min-height: 0 !important;
    min-width: 0 !important;
  }
  .ref-digibadge-scale-box {
    display: block;
  }
  html.ref-digibadge-embed-thumb .ref-digibadge-scale-box {
    margin: 0 auto;
    min-width: 0 !important;
    min-height: 0 !important;
    max-width: 100%;
    max-height: 100%;
    align-self: center;
    flex-shrink: 0;
    box-sizing: border-box;
  }
  html.ref-digibadge-embed-thumb .flow {
    width: max-content;
    max-width: none;
    flex-shrink: 0;
  }
  html.ref-digibadge-embed-thumb,
  html.ref-digibadge-embed-thumb body {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  html.ref-digibadge-embed-thumb::-webkit-scrollbar,
  html.ref-digibadge-embed-thumb body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="ref-digibadge-scale-box">
  <div class="flow">

    <div class="column">
      <div class="card">
        <div class="icon">🏛️</div>
        <div class="label">공공기관</div>
        <div class="subtext">고용24 / HRD</div>
      </div>
      <div class="card">
        <div class="icon">🎓</div>
        <div class="label">교육기관</div>
        <div class="subtext">자격 / 훈련</div>
      </div>
      <div class="card">
        <div class="icon">📱</div>
        <div class="label">PASS</div>
        <div class="subtext">인증 / 지갑</div>
      </div>
    </div>

    <div class="arrow"></div>

    <div class="column">
      <div class="system">디지털 배지 시스템</div>
      <div class="subtext">이력 데이터 통합 · 배지 생성</div>
    </div>

    <div class="arrow"></div>

    <div class="column">
      <div class="card">
        <div class="icon">📄</div>
        <div class="label">디지털 이력서</div>
      </div>
      <div class="card">
        <div class="icon">🏢</div>
        <div class="label">기업 제출</div>
      </div>
      <div class="card">
        <div class="icon">🎯</div>
        <div class="label">취업 활용</div>
      </div>
    </div>

    <div class="arrow"></div>

    <div class="column">
      <div class="blockchain">
        <div style="font-weight:600; font-size:13px;">블록체인</div>
        <div class="mini-wrap">
          <div class="mini">🪙<div>NFT</div></div>
          <div class="mini">📚<div>원장</div></div>
        </div>
      </div>
      <div class="subtext">위변조 방지 · 검증</div>
    </div>

  </div>
  </div>
</div>

<script>
(function () {
  var tries = 0;
  var vpTries = 0;
  function fit() {
    var wrap = document.querySelector('.wrap');
    var box = document.querySelector('.ref-digibadge-scale-box');
    var flow = document.querySelector('.flow');
    if (!wrap || !box || !flow) return;
    var fe = window.frameElement;
    var vw;
    var vh;
    if (fe && fe.clientWidth > 1 && fe.clientHeight > 1) {
      vw = fe.clientWidth;
      vh = fe.clientHeight;
    } else {
      var el = document.documentElement;
      var bw = document.body ? document.body.clientWidth : 0;
      var bh = document.body ? document.body.clientHeight : 0;
      vw = Math.max(el.clientWidth, bw, 1);
      vh = Math.max(el.clientHeight, bh, 1);
    }
    if (vw < 2 || vh < 2) {
      if (vpTries < 120) {
        vpTries++;
        requestAnimationFrame(fit);
      }
      return;
    }
    vpTries = 0;
    var pad = 10;
    flow.style.transform = 'none';
    flow.style.transformOrigin = 'top left';
    box.removeAttribute('style');
    wrap.style.cssText =
      'margin:0;box-sizing:border-box;width:100%;max-width:100%;height:100%;max-height:100%;min-height:0;min-width:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:2px;';
    var w = flow.scrollWidth || flow.offsetWidth;
    var h = flow.scrollHeight || flow.offsetHeight;
    if ((!w || !h) && tries < 20) {
      tries++;
      requestAnimationFrame(fit);
      return;
    }
    if (!w || !h) return;
    tries = 0;
    var s = Math.min((vw - pad) / w, (vh - pad) / h, 1) * 0.98 * 1.1;
    box.style.width = w * s + 'px';
    box.style.height = h * s + 'px';
    box.style.overflow = 'hidden';
    box.style.flexShrink = '0';
    box.style.minWidth = '0';
    box.style.minHeight = '0';
    box.style.maxWidth = '100%';
    box.style.maxHeight = '100%';
    box.style.boxSizing = 'border-box';
    flow.style.transform = 'scale(' + s + ')';
    flow.style.transformOrigin = 'top left';
  }
  function kick() {
    requestAnimationFrame(function () {
      requestAnimationFrame(fit);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', kick);
  } else {
    kick();
  }
  window.addEventListener('resize', kick);
  window.addEventListener('load', kick);
  window.addEventListener('pageshow', kick);
  if (typeof IntersectionObserver !== 'undefined') {
    try {
      var io = new IntersectionObserver(function () {
        kick();
      }, { threshold: [0, 0.01, 1] });
      io.observe(document.documentElement);
    } catch (e) {}
  }
})();
</script>

</body>
</html>
