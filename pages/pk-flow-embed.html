<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pk-flow embed</title>
  <style>
    html, body{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: transparent;
      font-family: 'Pretendard', system-ui, sans-serif;
      overflow: hidden;
      height: 100%;
    }

    .pk-flow-board{
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-height: 320px;
      border-radius: 16px;
      border: 2px dashed #cfd6de;
      background: #f8fafc;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .pk-flow-svg-wrap{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pk-flow-svg-wrap svg{
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
    }

    #pkFlowSvgMount{
      width: 100%;
      height: auto;
      display: block;
    }
    #pkFlowSvgMount svg{
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="pk-flow-board" id="pkFlowBoard" role="img" aria-label="서비스 흐름 다이어그램">
    <div class="pk-flow-svg-wrap" id="pkFlowSvgMount" aria-hidden="true"></div>
  </div>

  <script>
    (function(){
      var mount = document.getElementById('pkFlowSvgMount');
      var board = document.getElementById('pkFlowBoard');
      if (!mount || !board) return;

      var params = new URLSearchParams(window.location.search);
      var src = params.get('svg') || '../assets/BLOCKCHAIN_flow.svg';
      board.setAttribute('data-svg-src', src);

      var NS = 'http://www.w3.org/2000/svg';

      function injectIconParticleStyles(svg){
        if (svg.querySelector('style[data-pk-icon-particles]')) return;
        var st = document.createElementNS(NS, 'style');
        st.setAttribute('type', 'text/css');
        st.setAttribute('data-pk-icon-particles', 'true');
        st.textContent = [
          '[data-pk-flow-particles]{pointer-events:none}',
          '.pk-icon-particle{fill:none;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke;opacity:0.98;pointer-events:none;}',
          '.pk-icon-particle--issuer{stroke:#ecfeff;filter:drop-shadow(0 0 3px rgba(56,189,248,1))drop-shadow(0 0 10px rgba(59,130,246,0.75));}',
          '.pk-icon-particle--verifier{stroke:#f0fff9;filter:drop-shadow(0 0 4px rgba(167,243,208,0.98))drop-shadow(0 0 12px rgba(110,231,183,0.85))drop-shadow(0 0 18px rgba(52,211,153,0.45));}',
          '.pk-icon-particle{stroke-dashoffset:0;animation:pkIconPartFlow var(--pk-part-dur,2.4s) linear infinite;animation-delay:var(--pk-part-delay,0s);}',
          '@keyframes pkIconPartFlow{to{stroke-dashoffset:var(--pk-part-len)}}',
          '@media (prefers-reduced-motion:reduce){.pk-icon-particle{animation:none!important;opacity:0!important}}'
        ].join('');
        svg.insertBefore(st, svg.firstChild);
      }

      /* 발급: 삼각 캡만 · 검증: 증명서 카드 바깥선 path만 */
      function isIssuerParticleTargetPath(d){
        return !!d && /218\.6 193\.151/.test(d);
      }

      function isVerifierOuterFramePath(d){
        return !!d && /994\.75 183\.648/.test(d);
      }

      function getIconParticleKind(p){
        var d = p.getAttribute('d') || '';
        var stroke = (p.getAttribute('stroke') || '').trim();
        if (/^#2F6FFF$/i.test(stroke)){
          return isIssuerParticleTargetPath(d) ? 'issuer' : null;
        }
        if (/^#7B7FFF$/i.test(stroke)){
          return isVerifierOuterFramePath(d) ? 'verifier' : null;
        }
        return null;
      }

      function addIconParticleTrails(svg){
        var paths = Array.prototype.slice.call(svg.querySelectorAll('path'));
        var layer = document.createElementNS(NS, 'g');
        layer.setAttribute('data-pk-flow-particles', 'true');
        layer.setAttribute('aria-hidden', 'true');
        svg.appendChild(layer);

        paths.forEach(function(p){
          var kind = getIconParticleKind(p);
          if (!kind) return;
          var L;
          try { L = p.getTotalLength(); } catch (e) { L = 0; }
          if (!L || L < 6) return;

          var seg = Math.min(16, Math.max(5, L * 0.18));
          var gap = Math.max(L - seg, 1);
          var dur = 2.15 + (L % 5) * 0.12;

          function pushClone(delaySec){
            var c = p.cloneNode(true);
            c.removeAttribute('id');
            c.removeAttribute('marker-end');
            c.removeAttribute('marker-start');
            c.removeAttribute('marker-mid');
            c.removeAttribute('stroke');
            c.removeAttribute('fill');
            c.removeAttribute('fill-opacity');
            c.setAttribute('fill', 'none');
            c.setAttribute('class', 'pk-icon-particle pk-icon-particle--' + kind);
            c.style.strokeDasharray = seg + ' ' + gap;
            c.style.setProperty('--pk-part-len', String(L));
            c.style.setProperty('--pk-part-dur', dur + 's');
            c.style.setProperty('--pk-part-delay', (delaySec || 0) + 's');
            layer.appendChild(c);
          }

          pushClone(0);
          pushClone(dur * 0.48);
        });
      }

      fetch(src).then(function(res){ return res.text(); }).then(function(svgText){
        mount.innerHTML = svgText;
        var svg = mount.querySelector('svg');
        if (!svg) return;
        injectIconParticleStyles(svg);
        addIconParticleTrails(svg);
      }).catch(function(){
        mount.innerHTML = '<img src="' + src + '" alt="" loading="lazy" style="width:100%;height:auto;display:block;">';
      });
    })();
  </script>
</body>
</html>
